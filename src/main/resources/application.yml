spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: jdbc:postgresql://localhost:5432/aiassist
    username: aiassist
    password: aiassist
  jpa:
    hibernate:
      ddl-auto: update
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        model: llama-3.1-8b-instant
        options:
          model: llama-3.1-8b-instant
      embedding:
        enabled: false
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768

logging:
  level:
    com.shubham.aiassistant: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: DEBUG
